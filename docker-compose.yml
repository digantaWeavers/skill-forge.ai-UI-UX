services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: react-forge-container
    ports:
      - "3000:5173"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
